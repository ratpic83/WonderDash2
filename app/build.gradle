apply plugin: 'com.android.application'

android {
    compileSdkVersion 28
    defaultConfig {
        applicationId "com.wonderdash2"
        minSdkVersion 19
        targetSdkVersion 28
        versionCode 1
        versionName "0.1-alpha"
        multiDexEnabled true
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'com.android.support:appcompat-v7:28.0.0'
    implementation 'com.android.support:design:28.0.0'
    implementation 'org.osmdroid:osmdroid-android:6.1.10'
    implementation 'org.mapsforge:mapsforge-map-android:0.18.0'
    implementation 'com.squareup.okhttp3:okhttp:3.14.9'
    implementation 'com.google.code.gson:gson:2.8.9'
    implementation 'com.github.pires:obd-java-api:1.0-RC16'
    // Offline routing only (Photon removed; use HTTP API for local server)
    implementation 'com.graphhopper:graphhopper-core:7.0'
    // Add more as needed for music, etc.
}
